<script>
  // تم وضع الـ API Key الخاص بك هنا بنجاح ليعمل الرفع والربط بصورة صحيحة
  const IMGBB_API_KEY = "F8815ba034f14d4e8f12ab55376a2703"; 

  function uploadImagesToImgbb(input) {
    const files = input.files;
    const statusText = document.getElementById('upload-status-text');
    const urlsTextarea = document.getElementById('app-screenshots-urls');
    
    if (files.length === 0) return;

    statusText.style.display = 'block';
    statusText.style.color = '#3b82f6';
    statusText.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> جاري رفع \${files.length} صور تلقائياً...`;

    let uploadedUrls = [];
    let completed = 0;

    for (let i = 0; i < files.length; i++) {
      const formData = new FormData();
      formData.append("image", files[i]);

      fetch(`https://api.imgbb.com/1/upload?key=\${IMGBB_API_KEY}`, {
        method: "POST",
        body: formData
      })
      .then(response => response.json())
      .then(result => {
        completed++;
        if (result.success && result.data && result.data.url) {
          // جلب الرابط المباشر للرسومات المرفوعة بنجاح
          uploadedUrls.push(result.data.url);
        } else {
          console.error("API Error Response:", result);
        }
        
        if (completed === files.length) {
          if (uploadedUrls.length > 0) {
            statusText.style.color = '#10b981';
            statusText.innerHTML = `<i class="fa-solid fa-circle-check"></i> تم رفع \${uploadedUrls.length} صور بنجاح!`;
            
            const currentValues = urlsTextarea.value.trim();
            const separator = currentValues ? ", " : "";
            urlsTextarea.value = currentValues + separator + uploadedUrls.join(", ");
          } else {
            statusText.style.color = '#ef4444';
            statusText.innerHTML = `<i class="fa-solid fa-circle-xmark"></i> فشل رفع الصور، يرجى التحقق من صلاحية مفتاح الـ API.`;
          }
        }
      })
      .catch(error => {
        completed++;
        console.error("Network Error during upload:", error);
        if (completed === files.length) {
          statusText.style.color = '#ef4444';
          statusText.innerHTML = "حدث خطأ في الاتصال أثناء رفع الصور.";
        }
      });
    }
  }

<script>
  document.addEventListener("DOMContentLoaded", function() {
    const dataOrigin = document.getElementById("app-data"); if (!dataOrigin) return;
    const rawData = {

    };
    document.getElementById("live-name").innerText = rawData.name; document.getElementById("live-icon").setAttribute("src", rawData.icon); document.getElementById("live-dev").innerText = rawData.dev; document.getElementById("live-size").innerText = rawData.size; document.getElementById("live-version").innerText = rawData.version; document.getElementById("live-android").innerText = rawData.android; document.getElementById("live-update").innerText = rawData.update; document.getElementById("live-desc").innerHTML = rawData.descHtml; document.getElementById("live-link-play").setAttribute("href", rawData.playHref);

    // فحص الرابط المباشر للملف وتمريره للعد التنازلي
    document.getElementById("live-link-apk").setAttribute("href", rawData.apkHref);
    
    // تشغيل العداد عند التمرير لأسفل الصفحة
    const trigger = document.getElementById("target-terminal-trigger");
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          let remaining = 10;
          const interval = setInterval(() => {
            remaining--;
            document.getElementById("live-timer-text").innerText = remaining;
            document.getElementById("live-chrono-bar").style.strokeDashoffset = (283 / 10) * (10 - remaining);
            if (remaining <= 0) {
              clearInterval(interval);
              document.getElementById("live-timer-node").style.display = "none";
              document.getElementById("live-buttons-pack").style.display = "flex";
            }
          }, 1000);
          observer.unobserve(trigger);
        }
      });
    }, { threshold: 0.5 });
    observer.observe(trigger);
  });
<\/script>

    document.getElementById('generated-code').innerText = finalTemplate;
    document.getElementById('output-section').style.display = 'block';
    document.getElementById('output-section').scrollIntoView({ behavior: 'smooth' });
  }

  function copyToClipboard() {
    const codeText = document.getElementById('generated-code').innerText;
    navigator.clipboard.writeText(codeText).then(() => {
      alert('تم نسخ الكود الاحترافي بنجاح!');
    });
  }
</script>

</body>
</html>

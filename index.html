<script>
  // كود الـ API الخاص بـ Imgbb (مجاني وصالح للاستخدام)
  const IMGBB_API_KEY = "F8815ba034f14d4e8f12ab55376a2703"; // يمكنك استبداله بـ المفتاح الخاص بك لاحقاً إذا أردت

  function uploadImagesToImgbb(input) {
    const files = input.files;
    const statusText = document.getElementById('upload-status-text');
    const urlsTextarea = document.getElementById('app-screenshots-urls');
    
    if (files.length === 0) return;

    statusText.style.display = 'block';
    statusText.style.color = '#3b82f6';
    statusText.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> جاري رفع \${files.length} صور تلقائياً...`;

    let uploadedUrls = [];
    let completed = 0;

    for (let i = 0; i < files.length; i++) {
      const formData = new FormData();
      formData.append("image", files[i]);

      fetch(`https://api.imgbb.com/1/upload?key=\${IMGBB_API_KEY}`, {
        method: "POST",
        body: formData
      })
      .then(response => response.json())
      .then(result => {
        completed++;
        if (result.success) {
          // جلب الرابط المباشر للرسومات المرفوعة (Direct URL)
          uploadedUrls.push(result.data.url);
        }
        
        if (completed === files.length) {
          statusText.style.color = '#10b981';
          statusText.innerHTML = `<i class="fa-solid fa-circle-check"></i> تم رفع جميع الصور بنجاح!`;
          
          // إدراج الروابط في الخانة مفصولة بفاصلة
          const currentValues = urlsTextarea.value.trim();
          const separator = currentValues ? ", " : "";
          urlsTextarea.value = currentValues + separator + uploadedUrls.join(", ");
        }
      })
      .catch(error => {
        completed++;
        console.error("Error uploading:", error);
        if (completed === files.length) {
          statusText.innerHTML = "حدث خطأ أثناء رفع بعض الصور.";
        }
      });
    }
  }

<script>
  let finalDirectLink = "#";

  document.addEventListener("DOMContentLoaded", function() {
    const dataOrigin = document.getElementById("app-data"); if (!dataOrigin) return;
    const rawData = {
      name: dataOrigin.querySelector(".app-name")?.innerText || "Unknown Application", icon: dataOrigin.querySelector(".app-icon")?.innerText || "", dev: dataOrigin.querySelector(".app-dev")?.innerText || "Third-Party Developer", version: dataOrigin.querySelector(".app-version")?.innerText || "N/A", size: dataOrigin.querySelector(".app-size")?.innerText || "Undefined Size", android: dataOrigin.querySelector(".app-android")?.innerText || "Android 5.0+", update: dataOrigin.querySelector(".app-update")?.innerText || "Recent Date", downloads: dataOrigin.querySelector(".app-downloads")?.innerText || "100,000+", license: dataOrigin.querySelector(".app-license")?.innerText || "Free / Open Source", apkHref: dataOrigin.querySelector(".download-link")?.getAttribute("href") || "#", playHref: dataOrigin.querySelector(".play-link")?.getAttribute("href") || "#", descHtml: dataOrigin.querySelector(".app-description")?.innerHTML || "No description provided.", screenshots: dataOrigin.querySelector(".app-screenshots")?.innerText || ""
    };
    document.getElementById("live-name").innerText = rawData.name; document.getElementById("live-icon").setAttribute("src", rawData.icon); document.getElementById("live-dev").innerText = rawData.dev; document.getElementById("live-size").innerText = rawData.size; document.getElementById("live-version").innerText = rawData.version; document.getElementById("live-android").innerText = rawData.android; document.getElementById("live-update").innerText = rawData.update; document.getElementById("live-downloads").innerText = rawData.downloads; document.getElementById("live-license").innerText = rawData.license; document.getElementById("live-desc").innerHTML = rawData.descHtml; document.getElementById("live-link-play").setAttribute("href", rawData.playHref);
    const galleryContainer = document.getElementById("live-screenshots-gallery"); if (rawData.screenshots.trim()) { const urlArray = rawData.screenshots.split(","); urlArray.forEach(url => { if (url.trim()) { const imgNode = document.createElement("img"); imgNode.src = url.trim(); imgNode.className = "gallery-image-node"; galleryContainer.appendChild(imgNode); } }); }
    let isDown = false; let startX; let scrollLeft; galleryContainer.addEventListener('mousedown', (e) => { isDown = true; startX = e.pageX - galleryContainer.offsetLeft; scrollLeft = galleryContainer.scrollLeft; }); galleryContainer.addEventListener('mouseleave', () => { isDown = false; }); galleryContainer.addEventListener('mouseup', () => { isDown = false; }); galleryContainer.addEventListener('mousemove', (e) => { if(!isDown) return; e.preventDefault(); const x = e.pageX - galleryContainer.offsetLeft; const walk = (x - startX) * 2; galleryContainer.scrollLeft = scrollLeft - walk; });
    
    parseAndExtractLink(rawData.apkHref);

    const themeTrigger = document.getElementById("theme-toggle-trigger"); const preservedTheme = localStorage.getItem("premium-app-theme") || "light"; if (preservedTheme === "dark") { document.documentElement.setAttribute("data-theme", "dark"); themeTrigger.innerHTML = '<i class="fa-solid fa-sun"></i>'; }
    themeTrigger.addEventListener("click", function() { const targetTheme = document.documentElement.getAttribute("data-theme"); if (targetTheme === "dark") { document.documentElement.removeAttribute("data-theme"); localStorage.setItem("premium-app-theme", "light"); themeTrigger.innerHTML = '<i class="fa-solid fa-moon"></i>'; } else { document.documentElement.setAttribute("data-theme", "dark"); localStorage.setItem("premium-app-theme", "dark"); themeTrigger.innerHTML = '<i class="fa-solid fa-sun"></i>'; } });
  });

  function parseAndExtractLink(url) {
    const btnText = document.getElementById('live-link-apk');
    const statusText = document.getElementById('extraction-status-text');

    if (url.includes('drive.google.com')) {
      let fileId = '';
      if (url.includes('/d/')) { fileId = url.split('/d/')[1].split('/')[0]; } 
      else if (url.includes('id=')) { fileId = url.split('id=')[1].split('&')[0]; }
      if (fileId) { finalDirectLink = \`https://docs.google.com/uc?export=download&id=\${fileId}\`; btnText.innerHTML = '<i class="fa-solid fa-circle-down"></i> تحميل من Google Drive مباشر'; } 
      else { finalDirectLink = url; btnText.innerHTML = '<i class="fa-solid fa-circle-down"></i> تحميل ملف APK'; }
      initCountdownTrigger();
    } 
    else if (url.includes('github.com')) {
      finalDirectLink = url.replace('github.com', 'raw.githubusercontent.com').replace('/blob/', '/');
      btnText.innerHTML = '<i class="fa-solid fa-circle-down"></i> تحميل من GitHub مباشر';
      initCountdownTrigger();
    } 
    else if (url.includes('mediafire.com')) {
      statusText.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> <span>جاري فحص بروتوكول MediaFire...</span>';
      const proxyUrl = 'https://api.allorigins.win/get?url=';
      fetch(proxyUrl + encodeURIComponent(url))
        .then(res => res.json())
        .then(data => {
          const parser = new DOMParser();
          const doc = parser.parseFromString(data.contents, 'text/html');
          const downloadBtn = doc.getElementById('downloadButton');
          if (downloadBtn) { finalDirectLink = downloadBtn.getAttribute('href'); btnText.innerHTML = '<i class="fa-solid fa-circle-down"></i> تحميل من MediaFire مباشر'; } 
          else { finalDirectLink = url; btnText.innerHTML = '<i class="fa-solid fa-paper-plane"></i> انتقال إلى صفحة MediaFire'; }
          initCountdownTrigger();
        })
        .catch(err => { finalDirectLink = url; btnText.innerHTML = '<i class="fa-solid fa-paper-plane"></i> انتقال إلى صفحة MediaFire'; initCountdownTrigger(); });
    } 
    else { finalDirectLink = url; btnText.innerHTML = '<i class="fa-solid fa-circle-down"></i> تحميل تطبيق APK برابط مباشر'; initCountdownTrigger(); }
  }

  function initCountdownTrigger() {
    let timeRemaining = 10; const totalDuration = 10; const perimeter = 283; 
    const timerTextNode = document.getElementById("live-timer-text"); 
    const chronoBarNode = document.getElementById("live-chrono-bar"); 
    const timerMasterBox = document.getElementById("live-timer-node"); 
    const timerStatusNode = document.getElementById("live-timer-status"); 
    const buttonsDeploymentZone = document.getElementById("live-buttons-pack"); 
    const terminalTriggerZone = document.getElementById("target-terminal-trigger"); 
    let countdownInterval = null; let hasStarted = false;

    timerStatusNode.innerHTML = '<i class="fa-solid fa-scroll-pointer"></i> <span>انزل إلى هنا لتجهيز روابط التحميل المباشرة...</span>';

    function startPremiumCountdown() { 
      if (hasStarted) return; hasStarted = true; 
      timerStatusNode.innerHTML = '<i class="fa-solid fa-shield-halved fa-spin"></i> <span>جاري تحضير رابط التحميل الآمن الآن...</span>'; 
      countdownInterval = setInterval(() => { 
        timeRemaining--; timerTextNode.innerText = timeRemaining; 
        let offset = (perimeter / totalDuration) * (totalDuration - timeRemaining); 
        chronoBarNode.style.strokeDashoffset = offset; 
        if (timeRemaining <= 0) { 
          clearInterval(countdownInterval); 
          timerMasterBox.style.opacity = "0"; 
          timerStatusNode.style.display = "none"; 
          setTimeout(() => { 
            timerMasterBox.style.display = "none"; 
            document.getElementById("live-link-apk").setAttribute("href", finalDirectLink);
            buttonsDeploymentZone.style.display = "flex"; 
          }, 300); 
        } 
      }, 1000); 
    }
    const observerOptions = { root: null, threshold: 0.6 }; 
    const observer = new IntersectionObserver((entries, observer) => { 
      entries.forEach(entry => { if (entry.isIntersecting) { startPremiumCountdown(); observer.unobserve(entry.target); } }); 
    }, observerOptions); 
    observer.observe(terminalTriggerZone);
  }
<\/script>
`;

    document.getElementById('generated-code').innerText = finalTemplate;
    document.getElementById('output-section').style.display = 'block';
    document.getElementById('output-section').scrollIntoView({ behavior: 'smooth' });
  }

  function copyToClipboard() {
    const codeText = document.getElementById('generated-code').innerText;
    navigator.clipboard.writeText(codeText).then(() => {
      alert('تم نسخ الكود الاحترافي بنجاح!');
    });
  }
</script>
